repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty check
        description: Type check src/ with ty.
        entry: ty check --project piazza --exit-zero-on-warning
        language: system
        pass_filenames: false
        require_serial: true
        types: [python]

  - repo: https://github.com/rohaquinlop/complexipy-pre-commit
    rev: v5.1.0
    hooks:
      - id: complexipy
        files: ^piazza/src/piazza/
        exclude: ^piazza/src/piazza/_vendor/
        args: [-mx, "20"]
