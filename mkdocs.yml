site_name: piazza
site_description: Agent messaging hub for multi-agent collaboration
site_author: Peng Ding
site_url: https://piazza.readthedocs.io/en/latest
repo_name: Oaklight/piazza
repo_url: https://github.com/Oaklight/piazza
copyright: Copyright &copy; 2026 Peng Ding

theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.action.edit

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            members_order: source
  - llmstxt:
      full_output: llms-full.txt
      sections:
        Home:
          - index.md
        Get Started:
          - usage/installation.md
          - usage/quickstart.md
        Architecture:
          - architecture/overview.md
        Guides:
          - usage/index.md
          - usage/cli.md
          - usage/admin.md
          - usage/remote.md
          - usage/irc.md
        API Reference:
          - api/index.md
        Examples:
          - examples/index.md
        Changelog:
          - changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oaklight/piazza
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/piazza/
  alternate:
    - name: English
      link: /en/latest/
      lang: en
    - name: 中文
      link: /zh-cn/latest/
      lang: zh

nav:
  - Home: index.md
  - Get Started:
      - Installation: usage/installation.md
      - Quick Start: usage/quickstart.md
  - Architecture:
      - Overview: architecture/overview.md
  - Guides:
      - Usage Overview: usage/index.md
      - CLI Usage: usage/cli.md
      - Admin Panel: usage/admin.md
      - Remote Transport: usage/remote.md
      - IRC Frontend: usage/irc.md
  - API Reference:
      - Overview: api/index.md
      - Bus: api/bus.md
      - PiazzaClient: api/client.md
      - PiazzaServer: api/server.md
      - Backends: api/backends.md
      - Frontends: api/frontends.md
      - Transport: api/transport.md
      - Types: api/types.md
  - Examples:
      - examples/index.md
  - Changelog: changelog.md
